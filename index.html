<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://telegram.org" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.cdnfonts.com/css/gilroy-bold" rel="stylesheet" />
    <title>Rivaldsg - Portfolio</title>
    <link rel="icon" type="image/png" href="/images/brand/rival-black-hole-logo.png?v=3" />
    <link rel="shortcut icon" type="image/png" href="/images/brand/rival-black-hole-logo.png?v=3" />
    <link rel="apple-touch-icon" href="/images/brand/rival-black-hole-logo.png?v=3" />
    <meta name="theme-color" content="#050608" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      (() => {
        try {
          const tg = window.Telegram && window.Telegram.WebApp;
          const root = document.documentElement;
          const height = Math.max(320, Math.round(tg?.viewportHeight || window.innerHeight || 0));
          root.style.setProperty("--tg-app-height", `${height}px`);
          root.style.setProperty("--tg-stable-height", `${Math.max(320, Math.round(tg?.viewportStableHeight || height))}px`);
          root.style.setProperty("--rs-tg-bg", tg?.themeParams?.bg_color || "#030408");
          const coarse = Boolean(window.matchMedia?.("(pointer: coarse)")?.matches);
          const compact = Boolean(window.matchMedia?.("(max-width: 760px)")?.matches);
          const mobileUa = /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
          const mobile = Boolean(tg || coarse || compact || mobileUa);
          const smooth = Boolean(
            mobile ||
            window.matchMedia?.("(prefers-reduced-motion: reduce)")?.matches ||
            Number(navigator.deviceMemory || 8) <= 4 ||
            Number(navigator.hardwareConcurrency || 8) <= 4
          );
          root.dataset.rsMobile = mobile ? "true" : "false";
          root.dataset.rsPerformance = smooth ? "smooth" : "full";
          tg?.ready?.();
          tg?.expand?.();
        } catch {}
      })();
    </script>
    <style>
      html, body, #root {
        width: 100%;
        min-height: var(--tg-app-height, 100dvh);
        overflow-x: clip;
        background: var(--rs-tg-bg, #030408);
        color-scheme: dark;
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes imgModalCardIn {
        from { opacity: 0; transform: translateY(40px) scale(0.96); }
        to   { opacity: 1; transform: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.jsx"></script>
  </body>
</html>
